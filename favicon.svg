name                  = "mtflix"
compatibility_date    = "2024-09-23"
pages_build_output_dir = "dist"

[[kv_namespaces]]
binding    = "STORE_KV"
id         = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_PREVIEW_ID"

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"

# Production env vars → set in Cloudflare Dashboard (NOT here):
# STRIPE_SECRET_KEY  = sk_live_xxxxxxx   ← Secret
# ADMIN_TOKEN        = 5782ca441bdbc59a3726c1a6d74df86f405b2ac8780d56a0529555a80565a3cc
# ALLOWED_ORIGIN     = https://your-project.pages.dev
